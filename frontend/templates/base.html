<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gray: {
                            50:  '#fafafa',
                            100: '#f5f5f5',
                            200: '#e5e5e5',
                            300: '#d4d4d4',
                            400: '#a3a3a3',
                            500: '#737373',
                            600: '#525252',
                            700: '#333333',
                            800: '#1a1a1a',
                            900: '#0a0a0a',
                            950: '#050505',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- HTMX for interactivity -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Alpine.js for small interactions -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
    </style>
    
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="w-full px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center">
                        <span class="text-xl font-bold text-pink-500">🔗</span>
                        <span class="ml-2 text-lg font-semibold">{{ app_name }}</span>
                    </a>
                    
                    <div class="ml-10 flex items-center space-x-4">
                        <a href="/" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-700 {% if request.url.path == '/' %}bg-gray-700{% endif %}">
                            Dashboard
                        </a>
                        <a href="/domains" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-700 {% if '/domains' in request.url.path and '/competitors' not in request.url.path %}bg-gray-700{% endif %}">
                            Domains
                        </a>
                        <a href="/competitors" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-700 {% if '/competitors' in request.url.path %}bg-gray-700{% endif %}">
                            Competitors
                        </a>
                        <a href="/outreach" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-700 {% if '/outreach' in request.url.path %}bg-gray-700{% endif %}">
                            Outreach
                        </a>
                        <a href="/deals" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-700 {% if '/deals' in request.url.path %}bg-gray-700{% endif %}">
                            Deals
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="w-full px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Toast notifications -->
    <div id="toast-container" class="fixed bottom-4 right-4 space-y-2 z-50"></div>
    
    <script>
        // Toast notification helper
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-600' : 
                           type === 'error' ? 'bg-red-600' : 
                           type === 'warning' ? 'bg-yellow-600' : 'bg-gray-600';
            toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg max-w-md`;
            toast.style.whiteSpace = 'pre-line';
            toast.textContent = message;
            container.appendChild(toast);
            const duration = type === 'warning' ? 6000 : 3000;
            setTimeout(() => toast.remove(), duration);
        }
        
        // HTMX event handlers
        document.body.addEventListener('htmx:responseError', function(evt) {
            showToast('An error occurred', 'error');
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
