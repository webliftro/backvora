{% extends "base.html" %}

{% block title %}Competitors - {{ app_name }}{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold">Competitors</h1>
        <button onclick="showAddCompetitorModal()" class="px-4 py-2 bg-pink-600 hover:bg-pink-700 rounded-lg text-sm font-medium">
            + Fetch Competitor Backlinks
        </button>
    </div>

    <!-- Competitors Grid -->
    <div id="competitors-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="text-gray-500">Loading...</div>
    </div>
</div>

<!-- Add Competitor Modal -->
<div id="add-competitor-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-gray-800 rounded-lg p-6 w-full max-w-lg border border-gray-700">
        <h2 class="text-lg font-semibold mb-4">Fetch Competitor Backlinks</h2>
        <form onsubmit="fetchCompetitor(event)">
            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-2">Competitor Domain</label>
                <input type="text" id="competitor-domain" placeholder="e.g., competitor.com"
                       class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-pink-500"
                       required>
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-2">Max backlinks to fetch</label>
                <input type="number" id="fetch-limit" value="100" min="1" max="1000"
                       class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-pink-500">
            </div>
            <div id="fetch-status" class="mb-4 hidden"></div>
            <div class="flex justify-end gap-3">
                <button type="button" onclick="hideAddCompetitorModal()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm">
                    Cancel
                </button>
                <button type="submit" id="fetch-btn" class="px-4 py-2 bg-pink-600 hover:bg-pink-700 rounded-lg text-sm font-medium">
                    Fetch
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let competitors = [];

    async function loadCompetitors() {
        try {
            const res = await fetch('/api/v1/domains/competitors/list');
            const data = await res.json();
            competitors = data.items || [];
            renderCompetitors();
        } catch (e) {
            document.getElementById('competitors-grid').innerHTML = 
                '<p class="text-red-400">Failed to load competitors</p>';
        }
    }

    function renderCompetitors() {
        const grid = document.getElementById('competitors-grid');
        
        if (competitors.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full text-center py-12">
                    <p class="text-gray-400 text-lg mb-2">No competitors yet</p>
                    <p class="text-gray-500 text-sm mb-4">Fetch competitor backlinks to get started</p>
                    <button onclick="showAddCompetitorModal()" class="px-4 py-2 bg-pink-600 hover:bg-pink-700 rounded-lg text-sm font-medium">
                        + Fetch Competitor Backlinks
                    </button>
                </div>
            `;
            return;
        }
        
        grid.innerHTML = competitors.map(c => `
            <a href="/domains?target=${encodeURIComponent(c.domain)}" 
               class="bg-gray-800 rounded-lg p-6 border border-gray-700 hover:border-pink-500 transition-colors block">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <h3 class="text-lg font-semibold text-white">${c.domain}</h3>
                        <a href="https://${c.domain}" target="_blank" onclick="event.stopPropagation()" 
                           class="text-gray-500 hover:text-gray-300 text-xs">↗ visit site</a>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 mt-4">
                    <div>
                        <div class="text-xs text-gray-400">Referring Domains</div>
                        <div class="text-xl font-bold text-pink-500">${(c.referring_domains || 0).toLocaleString()}</div>
                    </div>
                    <div>
                        <div class="text-xs text-gray-400">Total Backlinks</div>
                        <div class="text-xl font-bold text-white">${(c.backlink_count || 0).toLocaleString()}</div>
                    </div>
                    <div>
                        <div class="text-xs text-gray-400">Avg. DR</div>
                        <div class="text-lg font-semibold text-white">${c.avg_dr ?? '-'}</div>
                    </div>
                    <div>
                        <div class="text-xs text-gray-400">Avg. Traffic</div>
                        <div class="text-lg font-semibold text-white">${c.avg_traffic ? c.avg_traffic.toLocaleString() : '-'}</div>
                    </div>
                </div>
            </a>
        `).join('');
    }

    // Modal
    function showAddCompetitorModal() {
        document.getElementById('add-competitor-modal').classList.remove('hidden');
        document.getElementById('fetch-status').classList.add('hidden');
    }

    function hideAddCompetitorModal() {
        document.getElementById('add-competitor-modal').classList.add('hidden');
    }

    async function fetchCompetitor(event) {
        event.preventDefault();
        const domain = document.getElementById('competitor-domain').value.trim();
        const limit = document.getElementById('fetch-limit').value;
        const statusDiv = document.getElementById('fetch-status');
        const btn = document.getElementById('fetch-btn');
        
        if (!domain) return;
        
        statusDiv.classList.remove('hidden');
        statusDiv.innerHTML = '<p class="text-pink-400">⏳ Fetching backlinks from Ahrefs...</p>';
        btn.disabled = true;
        btn.textContent = 'Fetching...';
        
        try {
            const res = await fetch(`/api/v1/backlinks/fetch/${encodeURIComponent(domain)}?limit=${limit}`, {
                method: 'POST'
            });
            const data = await res.json();
            
            if (data.success) {
                statusDiv.innerHTML = `
                    <div class="text-green-400">
                        ✅ Done!<br>
                        Fetched ${data.total_fetched} backlinks → ${data.unique_domains} unique domains<br>
                        ${data.domains_added} new domains added, ${data.backlinks_added} backlinks recorded
                    </div>
                `;
                await loadCompetitors();
            } else {
                statusDiv.innerHTML = `<p class="text-red-400">Error: ${data.detail || 'Unknown error'}</p>`;
            }
        } catch (e) {
            statusDiv.innerHTML = `<p class="text-red-400">Error: ${e.message}</p>`;
        }
        
        btn.disabled = false;
        btn.textContent = 'Fetch';
    }

    loadCompetitors();
</script>
{% endblock %}
